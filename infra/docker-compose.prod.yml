version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: curio-feed-backend-prod
    restart: unless-stopped
    ports:
      # Bind to localhost 8080 to prevent direct public access to Spring Boot
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m -XX:+UseSerialGC
