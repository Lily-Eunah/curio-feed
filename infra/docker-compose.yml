version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: curio-feed-db
    environment:
      POSTGRES_USER: curio
      POSTGRES_PASSWORD: curio_password
      POSTGRES_DB: curio_feed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: curio-feed-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/curio_feed
      SPRING_DATASOURCE_USERNAME: curio
      SPRING_DATASOURCE_PASSWORD: curio_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: curio-feed-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
