spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/curio_feed}
    username: ${SPRING_DATASOURCE_USERNAME:curio}
    password: ${SPRING_DATASOURCE_PASSWORD:curio_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
  threads:
    virtual:
      enabled: true

ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:gemma4:e4b}
    fallback-model: ${OLLAMA_FALLBACK_MODEL:qwen3:14b-q4_K_M}
    connect-timeout-seconds: 5
    read-timeout-seconds: 180
  pipeline:
    max-retry-count: 3
    stale-job-threshold-minutes: 10
    scheduler-fixed-delay-ms: 3000
    scheduler-batch-size: 5
    score-thresholds:
      EASY: 0.65
      MEDIUM: 0.70
      HARD: 0.80
