server:
  port: ${PORT:8080}

spring:
  application:
    name: backend
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/curio_feed}
    username: ${SPRING_DATASOURCE_USERNAME:curio}
    password: ${SPRING_DATASOURCE_PASSWORD:curio_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
  threads:
    virtual:
      enabled: true

admin:
  api:
    # Shared token required in the X-Admin-Token header for /api/admin/** endpoints.
    # Fail-closed: when unset, all admin requests are rejected with 503.
    token: ${ADMIN_API_TOKEN:}

ai:
  # Set to "gemini" to use Google Gemini API, or "ollama" (default) for local Ollama
  provider: ${AI_PROVIDER:ollama}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:gemma4:e4b}
    fallback-model: ${OLLAMA_FALLBACK_MODEL:qwen3:14b-q4_K_M}
    connect-timeout-seconds: 5
    read-timeout-seconds: 1200
    num-ctx: 16384
    temperature: 0.3
  gemini:
    api-key: ${GEMINI_API_KEY:}
    # Recommended free-tier model: gemini-2.5-flash (1M context, JSON schema output)
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    fallback-model: ${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    temperature: 0.3
  pipeline:
    max-retry-count: 3
    stale-job-threshold-minutes: 10
    scheduler-fixed-delay-ms: 3000
    scheduler-batch-size: 5
    use-three-step: true
    score-thresholds:
      EASY: 0.65
      MEDIUM: 0.70
      HARD: 0.80

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: curio-feed-backend

