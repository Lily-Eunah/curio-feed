services:
  - type: web
    name: curio-feed-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: singapore
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Shared admin token — set the value in the Render dashboard (Environment tab).
      # Without it, /api/admin/** returns 503 (fail-closed).
      - key: ADMIN_API_TOKEN
        sync: false
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: curio-feed-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: curio-feed-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: curio-feed-db
          property: password

databases:
  - name: curio-feed-db
    databaseName: curiofeed
    user: curiofeed
    region: singapore
    plan: free
